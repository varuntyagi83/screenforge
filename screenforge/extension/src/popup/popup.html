<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScreenForge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 700;
    }
    .status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #e5e7eb;
      color: #6b7280;
    }
    .status.recording {
      background: #fecaca;
      color: #dc2626;
    }
    .status.connected {
      background: #d1fae5;
      color: #059669;
    }
    .section {
      margin-bottom: 12px;
    }
    .section label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 4px;
    }
    select {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 13px;
      background: white;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-record {
      background: #dc2626;
      color: white;
    }
    .btn-record:hover { background: #b91c1c; }
    .btn-stop {
      background: #374151;
      color: white;
    }
    .btn-stop:hover { background: #1f2937; }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .link {
      display: block;
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
      color: #3b82f6;
      text-decoration: none;
    }
    .link:hover { text-decoration: underline; }
    .timer {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      margin: 16px 0;
      color: #dc2626;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>ScreenForge</h1>
    <span class="status" id="status">Idle</span>
  </div>

  <div id="idle-view">
    <div class="section">
      <label>Audio Source</label>
      <select id="audio-select">
        <option value="tab">Tab Audio</option>
        <option value="mic">Microphone</option>
        <option value="both">Tab + Microphone</option>
      </select>
    </div>

    <button class="btn btn-record" id="start-btn">Start Recording</button>
  </div>

  <div id="recording-view" style="display:none">
    <div class="timer" id="timer">00:00</div>
    <button class="btn btn-stop" id="stop-btn">Stop Recording</button>
  </div>

  <a class="link" href="http://localhost:3000/library" target="_blank" id="library-link">
    Open Library →
  </a>

  <script src="popup.js" type="module"></script>
</body>
</html>
